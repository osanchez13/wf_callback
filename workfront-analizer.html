<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Workfront Exporter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: #0a0d14; color: #e2e8f0; padding: 24px; min-height: 100vh; }
.wrap { max-width: 600px; margin: 0 auto; }
.topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.badge { font-size: 11px; color: #3b82f6; background: #1e2d45; padding: 2px 10px; border-radius: 20px; border: 1px solid #2a4a7a; margin-left: auto; }
.card { background: #0d1117; border: 1px solid #1e2535; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.ctitle { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.cdesc { font-size: 12px; color: #64748b; margin-bottom: 16px; line-height: 1.6; }
.flabel { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: 500; }
.field { margin-bottom: 14px; }
select { width: 100%; padding: 9px 11px; border-radius: 6px; border: 1px solid #1e2535; background: #0a0d14; color: #e2e8f0; font-size: 13px; outline: none; }
select:focus { border-color: #3b82f6; }
.btnp { padding: 11px 20px; border-radius: 8px; background: #3b82f6; color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; width: 100%; }
.btnp:hover:not(:disabled) { background: #2563eb; }
.btnp:disabled { background: #1e2d45; color: #475569; cursor: not-allowed; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #1e2535; background: transparent; color: #94a3b8; cursor: pointer; font-size: 12px; font-weight: 600; font-family: system-ui; }
.btn:hover { border-color: #3b82f6; color: #3b82f6; }
.badge-green { display: inline-flex; align-items: center; gap: 6px; background: #0f2d1a; border: 1px solid #166534; color: #4ade80; border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 600; }
.gdot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
.err { font-size: 11px; color: #f59e0b; margin-top: 8px; }
.hint { font-size: 11px; color: #475569; margin-top: 5px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #1e2535; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.waiting { background: #0f1e35; border: 1px solid #1e3a5f; border-radius: 8px; padding: 14px 16px; font-size: 12px; color: #93c5fd; line-height: 1.8; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 10px; }
.big-spinner { width: 18px; height: 18px; border: 2px solid #1e2535; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; margin-top: 2px; }
.success { background: #0a1f12; border: 1px solid #166534; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.success-title { font-size: 15px; font-weight: 700; color: #4ade80; margin-bottom: 6px; }
.success-desc { font-size: 12px; color: #86efac; line-height: 1.7; margin-bottom: 16px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: #0d1117; border: 1px solid #1e2535; border-radius: 8px; padding: 12px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; }
.stat-l { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.dl-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 8px; background: #14532d; border: 1px solid #166534; color: #4ade80; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; width: 100%; margin-bottom: 10px; }
.dl-btn:hover { background: #166534; }
.copy-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: 8px; background: transparent; border: 1px solid #1e2535; color: #94a3b8; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; width: 100%; }
.copy-btn:hover { border-color: #3b82f6; color: #3b82f6; }
.instructions { background: #0f1e35; border: 1px solid #1e3a5f; border-radius: 8px; padding: 14px; font-size: 12px; color: #93c5fd; line-height: 1.9; margin-top: 14px; }
.instructions ol { padding-left: 18px; }
.instructions li { margin-bottom: 4px; }
.row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></div>
    <span style="font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#94a3b8">Workfront Exporter</span>
    <span class="badge">Workfront → JSON → Claude</span>
  </div>
  <div id="app"></div>
</div>

<script>
var WF_DOMAIN = "prokarmaptrsd.sb01.workfront.com";
var WF_CLIENT_ID = "b1ad0cca283bebd52bd8cdb38b9dc666";
var WORKER = "https://patient-violet-7e22.omarsanchezjasso.workers.dev";
var REDIRECT_URI = WORKER + "/callback";

var state = {
  step: "connect", // connect | waiting | projects | exporting | done
  token: null,
  wfUser: null,
  wfProjects: [],
  selProject: "",
  projectName: "",
  exportData: null,
  err: "",
  codeVerifier: null,
  pollInterval: null,
  lastCode: null
};

// ── PKCE ──────────────────────────────────────────────────────────────────
function genVerifier() {
  var arr = new Uint8Array(48);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode.apply(null, arr)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
function genChallenge(v) {
  return crypto.subtle.digest("SHA-256", new TextEncoder().encode(v)).then(function(d) {
    return btoa(String.fromCharCode.apply(null, new Uint8Array(d))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
  });
}

// ── OAuth flow ────────────────────────────────────────────────────────────
async function startLogin() {
  state.err = "";
  state.lastCode = null;
  var verifier = genVerifier();
  state.codeVerifier = verifier;
  var challenge = await genChallenge(verifier);
  var params = new URLSearchParams({
    client_id: WF_CLIENT_ID,
    response_type: "code",
    redirect_uri: REDIRECT_URI,
    code_challenge: challenge,
    code_challenge_method: "S256",
    scope: "openid",
    state: genVerifier().substring(0, 16)
  });
  state.step = "waiting";
  render();
  window.open("https://" + WF_DOMAIN + "/integrations/oauth2/authorize?" + params, "_blank");
  startPolling();
}

function startPolling() {
  // Poll the worker to check if token is stored after callback
  state.pollInterval = setInterval(async function() {
    try {
      // Check if callback page has the code by fetching worker status
      var r = await fetch(WORKER + "/token-status");
      var d = await r.json();
      if (d.hasToken) {
        stopPolling();
        // Get token from worker
        var tr = await fetch(WORKER + "/get-token");
        var td = await tr.json();
        if (td.access_token) {
          state.token = td.access_token;
          await loadProjects();
        }
      }
    } catch(e) {}
  }, 2000);
}

function stopPolling() {
  if (state.pollInterval) { clearInterval(state.pollInterval); state.pollInterval = null; }
}

// Also listen for postMessage (works when opened as popup in some browsers)
window.addEventListener("message", function(e) {
  if (e.data && e.data.type === "WF_CODE" && e.data.code && state.codeVerifier) {
    stopPolling();
    exchangeCode(e.data.code);
  }
});

async function exchangeCode(code) {
  try {
    var r = await fetch(WORKER + "/integrations/oauth2/api/v1/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        grant_type: "authorization_code",
        client_id: WF_CLIENT_ID,
        redirect_uri: REDIRECT_URI,
        code: code,
        code_verifier: state.codeVerifier
      })
    });
    var d = await r.json();
    if (!d.access_token) throw new Error(d.error_description || "Token exchange failed");
    state.token = d.access_token;
    state.codeVerifier = null;
    await loadProjects();
  } catch(e) {
    state.err = e.message;
    state.step = "connect";
    render();
  }
}

async function loadProjects() {
  try {
    var r = await fetch(WORKER + "/attask/api/v15.0/project/search", {
      headers: { "Authorization": "Bearer " + state.token }
    });
    var d = await r.json();
    if (d.error) throw new Error(d.error.message);
    state.wfProjects = d.data || [];
    if (state.wfProjects.length > 0) state.selProject = state.wfProjects[0].ID;
    try {
      var ur = await fetch(WORKER + "/attask/api/v15.0/user/search?fields=name", {
        headers: { "Authorization": "Bearer " + state.token }
      });
      var ud = await ur.json();
      if (ud.data && ud.data[0]) state.wfUser = ud.data[0].name;
    } catch(e) {}
    state.step = "projects";
  } catch(e) {
    state.err = e.message;
    state.step = "connect";
  }
  render();
}

async function exportProject() {
  if (!state.selProject) return;
  state.step = "exporting"; state.err = ""; render();
  try {
    var headers = { "Authorization": "Bearer " + state.token };

    var pr = await fetch(WORKER + "/attask/api/v15.0/project/" + state.selProject + "?fields=name,description,status,percentComplete,plannedStartDate,plannedCompletionDate", { headers: headers });
    var pd = await pr.json();
    var project = pd.data || {};

    var tr = await fetch(WORKER + "/attask/api/v15.0/task/search?projectID=" + state.selProject + "&fields=name,description,status,percentComplete,assignedTo:name,plannedStartDate,plannedCompletionDate", { headers: headers });
    var td = await tr.json();
    var tasks = td.data || [];

    state.exportData = {
      exportedAt: new Date().toISOString(),
      project: {
        id: project.ID,
        name: project.name,
        status: project.status,
        percentComplete: project.percentComplete,
        description: project.description,
        plannedStartDate: project.plannedStartDate,
        plannedCompletionDate: project.plannedCompletionDate
      },
      tasks: tasks.map(function(t) {
        return {
          id: t.ID,
          name: t.name,
          status: t.status,
          percentComplete: t.percentComplete,
          description: t.description || null,
          assignedTo: t.assignedTo ? t.assignedTo.name : null,
          plannedStartDate: t.plannedStartDate,
          plannedCompletionDate: t.plannedCompletionDate
        };
      })
    };
    state.projectName = project.name;
    state.step = "done";
  } catch(e) {
    state.err = e.message;
    state.step = "projects";
  }
  render();
}

function downloadJSON() {
  if (!state.exportData) return;
  var blob = new Blob([JSON.stringify(state.exportData, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "workfront-" + (state.projectName || "project").replace(/[^a-z0-9]/gi, "-").toLowerCase() + ".json";
  a.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  if (!state.exportData) return;
  navigator.clipboard.writeText(JSON.stringify(state.exportData, null, 2));
  var btn = document.getElementById("copyBtn");
  if (btn) { btn.textContent = "✅ Copied!"; setTimeout(function(){ render(); }, 1500); }
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render() {
  var h = "";

  if (state.step === "connect") {
    h += '<div class="card">';
    h += '<div class="ctitle">⚡ Sign in with Workfront</div>';
    h += '<div class="cdesc">Click below to sign in with your Workfront account. Any user with Workfront access can connect — no API key needed.</div>';
    if (state.err) h += '<div class="err" style="margin-bottom:12px">⚠ ' + esc(state.err) + '</div>';
    h += '<button class="btnp" onclick="startLogin()">Sign in with Workfront →</button>';
    h += '</div>';

  } else if (state.step === "waiting") {
    h += '<div class="card">';
    h += '<div class="waiting"><div class="big-spinner"></div>';
    h += '<div>A new tab opened for Workfront login.<br>Sign in there and this page will connect automatically.</div></div>';
    h += '<button class="btn" onclick="stopPolling();state.step=\'connect\';render()">Cancel</button>';
    h += '</div>';

  } else if (state.step === "projects") {
    h += '<div class="card">';
    h += '<div class="row">';
    h += '<div class="badge-green"><span class="gdot"></span>Connected' + (state.wfUser ? " · " + esc(state.wfUser) : "") + '</div>';
    h += '<button class="btn" onclick="state.step=\'connect\';state.token=null;state.wfProjects=[];render()">Sign out</button>';
    h += '</div>';
    h += '<div class="field"><label class="flabel">Select Project to Export</label>';
    var opts = "";
    state.wfProjects.forEach(function(p) { opts += '<option value="' + p.ID + '"' + (state.selProject === p.ID ? ' selected' : '') + '>' + esc(p.name) + '</option>'; });
    h += '<select onchange="state.selProject=this.value">' + opts + '</select>';
    h += '<div class="hint">' + state.wfProjects.length + ' projects available</div></div>';
    if (state.err) h += '<div class="err">' + esc(state.err) + '</div>';
    h += '<button class="btnp" ' + (!state.selProject ? 'disabled' : '') + ' onclick="exportProject()">Export to JSON →</button>';
    h += '</div>';

  } else if (state.step === "exporting") {
    h += '<div class="card" style="text-align:center;padding:32px 20px">';
    h += '<div class="big-spinner" style="margin:0 auto 12px"></div>';
    h += '<div style="font-size:13px;color:#93c5fd">Loading project and tasks...</div>';
    h += '</div>';

  } else if (state.step === "done") {
    var taskCount = state.exportData.tasks.length;
    var doneTasks = state.exportData.tasks.filter(function(t){ return t.status === "CPL"; }).length;
    var inpTasks = state.exportData.tasks.filter(function(t){ return t.status === "INP"; }).length;

    h += '<div class="success">';
    h += '<div class="success-title">✅ ' + esc(state.projectName) + '</div>';
    h += '<div class="success-desc">Exported successfully. Download or copy the JSON, then paste it into Claude chat with your SharePoint folder name.</div>';
    h += '<div class="stats">';
    h += '<div class="stat"><div class="stat-n">' + taskCount + '</div><div class="stat-l">Tasks</div></div>';
    h += '<div class="stat"><div class="stat-n">' + doneTasks + '</div><div class="stat-l">Complete</div></div>';
    h += '<div class="stat"><div class="stat-n">' + inpTasks + '</div><div class="stat-l">In Progress</div></div>';
    h += '</div>';
    h += '<button class="dl-btn" onclick="downloadJSON()">⬇ Download JSON file</button>';
    h += '<button class="copy-btn" id="copyBtn" onclick="copyJSON()">📋 Copy JSON to clipboard</button>';
    h += '</div>';

    h += '<div class="instructions"><strong style="color:#bfdbfe">Next — paste into Claude:</strong>';
    h += '<ol style="margin-top:8px">';
    h += '<li>Copy or download the JSON above</li>';
    h += '<li>Go to Claude chat and say:<br><em style="color:#e2e8f0">"Here is my Workfront project: [paste JSON].<br>Read SharePoint folder <strong>01_internal</strong> and propose task updates."</em></li>';
    h += '<li>Claude reads SharePoint via M365 and returns proposals</li>';
    h += '</ol></div>';

    h += '<div style="margin-top:14px">';
    h += '<button class="btn" onclick="state.step=\'projects\';state.exportData=null;render()">← Export another project</button>';
    h += '</div>';
  }

  document.getElementById("app").innerHTML = h;
}

render();
</script>
</body>
</html>
