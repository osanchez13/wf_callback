<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Workfront Exporter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: #0a0d14; color: #e2e8f0; padding: 24px; min-height: 100vh; }
.wrap { max-width: 600px; margin: 0 auto; }
.topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.badge { font-size: 11px; color: #3b82f6; background: #1e2d45; padding: 2px 10px; border-radius: 20px; border: 1px solid #2a4a7a; margin-left: auto; }
.card { background: #0d1117; border: 1px solid #1e2535; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.ctitle { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.cdesc { font-size: 12px; color: #64748b; margin-bottom: 14px; line-height: 1.6; }
.flabel { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: 500; }
.field { margin-bottom: 14px; }
input, select { width: 100%; padding: 9px 11px; border-radius: 6px; border: 1px solid #1e2535; background: #0a0d14; color: #e2e8f0; font-size: 13px; outline: none; font-family: monospace; }
input:focus, select:focus { border-color: #3b82f6; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #1e2535; background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; }
.btn:hover:not(:disabled) { border-color: #3b82f6; color: #3b82f6; }
.btnp { padding: 10px 20px; border-radius: 6px; background: #3b82f6; color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; width: 100%; }
.btnp:disabled { background: #1e2d45; color: #475569; cursor: not-allowed; }
.badge-green { display: inline-flex; align-items: center; gap: 6px; background: #0f2d1a; border: 1px solid #166534; color: #4ade80; border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 600; }
.gdot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
.err { font-size: 11px; color: #f59e0b; margin-top: 6px; }
.hint { font-size: 11px; color: #475569; margin-top: 5px; line-height: 1.5; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #1e2535; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.info-box { background: #0f1e35; border: 1px solid #1e3a5f; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #93c5fd; line-height: 1.8; margin-bottom: 14px; }
.success { background: #0a1f12; border: 1px solid #166534; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.success-title { font-size: 15px; font-weight: 700; color: #4ade80; margin-bottom: 8px; }
.success-desc { font-size: 12px; color: #86efac; line-height: 1.7; margin-bottom: 16px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: #0d1117; border: 1px solid #1e2535; border-radius: 8px; padding: 12px; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; color: #e2e8f0; }
.stat-l { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.dl-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 8px; background: #14532d; border: 1px solid #166534; color: #4ade80; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; width: 100%; margin-bottom: 10px; }
.dl-btn:hover { background: #166534; }
.copy-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: 8px; background: transparent; border: 1px solid #1e2535; color: #94a3b8; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; width: 100%; }
.copy-btn:hover { border-color: #3b82f6; color: #3b82f6; }
.instructions { background: #0f1e35; border: 1px solid #1e3a5f; border-radius: 8px; padding: 14px; font-size: 12px; color: #93c5fd; line-height: 1.9; margin-top: 14px; }
.instructions ol { padding-left: 18px; }
.instructions li { margin-bottom: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></div>
    <span style="font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#94a3b8">Workfront Exporter</span>
    <span class="badge">Workfront → JSON → Claude</span>
  </div>
  <div id="app"></div>
</div>

<script>
var WF_PROXY = "https://patient-violet-7e22.omarsanchezjasso.workers.dev";
var state = {
  apiKey: "", apiKeyIn: "",
  connecting: false, connected: false, wfErr: "",
  wfUser: null, wfProjects: [],
  selProject: "", projectName: "",
  loading: false, exported: false,
  exportData: null
};

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function connectWF() {
  if (!state.apiKeyIn.trim()) return;
  state.apiKey = state.apiKeyIn.trim();
  state.connecting = true; state.wfErr = ""; render();
  try {
    var r = await fetch(WF_PROXY + "/attask/api/v15.0/project/search?apiKey=" + state.apiKey);
    var d = await r.json();
    if (d.error) throw new Error(d.error.message || "Invalid API key");
    state.wfProjects = d.data || [];
    state.connected = true;
    try {
      var ur = await fetch(WF_PROXY + "/attask/api/v15.0/user/search?fields=name&apiKey=" + state.apiKey);
      var ud = await ur.json();
      if (ud.data && ud.data[0]) state.wfUser = ud.data[0].name;
    } catch(e) {}
  } catch(e) { state.wfErr = e.message; state.apiKey = ""; }
  state.connecting = false; render();
}

async function exportProject() {
  if (!state.selProject) return;
  state.loading = true; render();
  try {
    // Get project details
    var pr = await fetch(WF_PROXY + "/attask/api/v15.0/project/" + state.selProject + "?fields=name,description,status,percentComplete,plannedStartDate,plannedCompletionDate&apiKey=" + state.apiKey);
    var pd = await pr.json();
    var project = pd.data || {};

    // Get tasks
    var tr = await fetch(WF_PROXY + "/attask/api/v15.0/task/search?projectID=" + state.selProject + "&fields=name,description,status,percentComplete,assignedTo:name,plannedStartDate,plannedCompletionDate,parentID&apiKey=" + state.apiKey);
    var td = await tr.json();
    var tasks = td.data || [];

    state.exportData = {
      exportedAt: new Date().toISOString(),
      project: {
        id: project.ID,
        name: project.name,
        status: project.status,
        percentComplete: project.percentComplete,
        description: project.description,
        plannedStartDate: project.plannedStartDate,
        plannedCompletionDate: project.plannedCompletionDate
      },
      tasks: tasks.map(function(t) {
        return {
          id: t.ID,
          name: t.name,
          status: t.status,
          percentComplete: t.percentComplete,
          description: t.description || null,
          assignedTo: t.assignedTo ? t.assignedTo.name : null,
          plannedStartDate: t.plannedStartDate,
          plannedCompletionDate: t.plannedCompletionDate
        };
      })
    };
    state.projectName = project.name;
    state.exported = true;
  } catch(e) { state.wfErr = e.message; }
  state.loading = false; render();
}

function downloadJSON() {
  if (!state.exportData) return;
  var blob = new Blob([JSON.stringify(state.exportData, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "workfront-" + (state.projectName || "project").replace(/[^a-z0-9]/gi, "-").toLowerCase() + ".json";
  a.click();
  URL.revokeObjectURL(url);
}

function copyJSON() {
  if (!state.exportData) return;
  navigator.clipboard.writeText(JSON.stringify(state.exportData, null, 2));
  var btn = document.getElementById("copyBtn");
  if (btn) { btn.innerText = "✅ Copied!"; setTimeout(function(){ render(); }, 1500); }
}

function render() {
  var h = "";

  if (!state.connected) {
    h += '<div class="card"><div class="ctitle">⚡ Connect to Workfront</div>';
    h += '<div class="info-box"><strong style="color:#bfdbfe">Get your API key:</strong><ol style="padding-left:16px;margin-top:6px">';
    h += '<li>Open Workfront → F12 → Console</li>';
    h += '<li>Type <code style="background:#1e2535;padding:1px 4px;border-radius:3px">allow pasting</code> → Enter</li>';
    h += '<li>Run: <code style="background:#1e2535;padding:1px 4px;border-radius:3px;word-break:break-all">fetch("/attask/api/v15.0/user?action=generateApiKey",{method:"PUT",credentials:"include"}).then(r=>r.json()).then(d=>console.log(d.data.result))</code></li>';
    h += '<li>Copy the key and paste below</li></ol></div>';
    if (state.connecting) {
      h += '<div style="font-size:12px;color:#93c5fd;padding:8px 0"><span class="spinner"></span>Connecting...</div>';
    } else {
      h += '<div class="field"><label class="flabel">API Key</label>';
      h += '<input type="password" id="apiKeyIn" placeholder="ftk2if..." oninput="state.apiKeyIn=this.value" onkeydown="if(event.key===\'Enter\')connectWF()"></div>';
      if (state.wfErr) h += '<div class="err">⚠ ' + esc(state.wfErr) + '</div>';
      h += '<button class="btnp" onclick="connectWF()">Connect →</button>';
    }
    h += '</div>';

  } else if (!state.exported) {
    h += '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
    h += '<div class="badge-green"><span class="gdot"></span>Connected' + (state.wfUser ? " · " + esc(state.wfUser) : "") + '</div>';
    h += '<button class="btn" onclick="state.connected=false;state.apiKey=\'\';render()" style="font-size:11px;padding:4px 10px">Disconnect</button></div>';
    h += '<div class="field"><label class="flabel">Select Project</label>';
    var opts = '<option value="">Choose a project...</option>';
    state.wfProjects.forEach(function(p) { opts += '<option value="' + p.ID + '">' + esc(p.name) + '</option>'; });
    h += '<select onchange="state.selProject=this.value;state.wfErr=\'\'">' + opts + '</select>';
    h += '<div class="hint">' + state.wfProjects.length + ' projects available</div></div>';
    if (state.wfErr) h += '<div class="err">⚠ ' + esc(state.wfErr) + '</div>';
    h += '<button class="btnp" ' + (!state.selProject || state.loading ? 'disabled' : '') + ' onclick="exportProject()">';
    h += state.loading ? '<span class="spinner"></span>Loading tasks...' : '⬇ Export Project to JSON';
    h += '</button></div>';

  } else {
    var taskCount = state.exportData.tasks.length;
    var doneTasks = state.exportData.tasks.filter(function(t){ return t.status === "CPL"; }).length;
    var inpTasks = state.exportData.tasks.filter(function(t){ return t.status === "INP"; }).length;

    h += '<div class="success">';
    h += '<div class="success-title">✅ ' + esc(state.projectName) + '</div>';
    h += '<div class="success-desc">Project data exported successfully. Download or copy the JSON, then paste it into the Claude chat along with your SharePoint folder name.</div>';
    h += '<div class="stats">';
    h += '<div class="stat"><div class="stat-n">' + taskCount + '</div><div class="stat-l">Tasks</div></div>';
    h += '<div class="stat"><div class="stat-n">' + doneTasks + '</div><div class="stat-l">Complete</div></div>';
    h += '<div class="stat"><div class="stat-n">' + inpTasks + '</div><div class="stat-l">In Progress</div></div>';
    h += '</div>';
    h += '<button class="dl-btn" onclick="downloadJSON()">⬇ Download JSON file</button>';
    h += '<button class="copy-btn" id="copyBtn" onclick="copyJSON()">📋 Copy JSON to clipboard</button>';
    h += '</div>';

    h += '<div class="instructions"><strong style="color:#bfdbfe">Next step — paste into Claude chat:</strong><ol style="margin-top:8px">';
    h += '<li>Copy or download the JSON above</li>';
    h += '<li>Go to Claude chat and say:<br><em style="color:#e2e8f0">"Here is my Workfront project data: [paste JSON]. Read the SharePoint folder <strong>01_internal</strong> and propose task updates."</em></li>';
    h += '<li>Claude will read SharePoint via M365 connector and return proposals</li>';
    h += '</ol></div>';

    h += '<div style="margin-top:14px;display:flex;gap:10px">';
    h += '<button class="btn" onclick="state.exported=false;state.exportData=null;render()" style="flex:1">← Export another project</button>';
    h += '</div>';
  }

  document.getElementById("app").innerHTML = h;
}

render();
</script>
</body>
</html>
