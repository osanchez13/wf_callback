<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Project Intelligence — Workfront Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; background: #0a0d14; color: #e2e8f0; padding: 16px; min-height: 100vh; overflow-x: hidden; }
.topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.badge-blue { font-size: 11px; color: #3b82f6; background: #1e2d45; padding: 2px 10px; border-radius: 20px; border: 1px solid #2a4a7a; margin-left: auto; }
.stepper { display: flex; align-items: center; margin-bottom: 24px; }
.si { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #475569; white-space: nowrap; }
.si.a { color: #e2e8f0; font-weight: 600; }
.si.d { color: #3b82f6; }
.sn { width: 20px; height: 20px; border-radius: 50%; background: #1e2535; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #475569; flex-shrink: 0; }
.sn.a { background: #3b82f6; color: #fff; }
.sn.d { background: #1e3a5f; color: #3b82f6; }
.sdiv { flex: 1; height: 1px; background: #1e2535; margin: 0 6px; min-width: 4px; }
.card { background: #0d1117; border: 1px solid #1e2535; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
.ctitle { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.cdesc { font-size: 12px; color: #64748b; margin-bottom: 14px; line-height: 1.6; }
.slabel { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #3b82f6; margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.flabel { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: 500; }
input, select, textarea { width: 100%; padding: 9px 11px; border-radius: 6px; border: 1px solid #1e2535; background: #0a0d14; color: #e2e8f0; font-size: 13px; outline: none; font-family: monospace; }
textarea { resize: vertical; min-height: 100px; line-height: 1.5; font-size: 11px; }
input:focus, select:focus, textarea:focus { border-color: #3b82f6; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #1e2535; background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; }
.btn:hover:not(:disabled) { border-color: #3b82f6; color: #3b82f6; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btnp { padding: 9px 18px; border-radius: 6px; background: #3b82f6; color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: system-ui; }
.btnp:disabled { background: #1e2d45; color: #475569; cursor: not-allowed; }
.badge-green { display: inline-flex; align-items: center; gap: 6px; background: #0f2d1a; border: 1px solid #166534; color: #4ade80; border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 600; }
.gdot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
.hint { font-size: 11px; color: #475569; margin-top: 5px; line-height: 1.5; }
.err { font-size: 11px; color: #f59e0b; margin-top: 6px; }
.info-box { background: #0f1e35; border: 1px solid #1e3a5f; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #93c5fd; line-height: 1.8; margin-bottom: 12px; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #1e2535; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.row2 { display: flex; flex-direction: column; gap: 14px; }
.row2 .field { flex: 1; }
.prompt-box { background: #050709; border: 1px solid #1e2535; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 11px; color: #93c5fd; max-height: 160px; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
.hlabel { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; margin-top: 16px; }
.pc { border: 1px solid #1e2535; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.pc.ap { border-color: #166534; background: #0a1f12; }
.dr { display: flex; gap: 10px; margin-bottom: 10px; }
.db { flex: 1; min-width: 0; }
.dl { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.dv { font-size: 12px; background: #0a0d14; border: 1px solid #1e2535; border-radius: 6px; padding: 7px 9px; color: #94a3b8; font-family: monospace; min-height: 32px; word-break: break-word; }
.dv.nw { color: #e2e8f0; border-color: #1e3a5f; background: #0f1e35; }
.rsn { font-size: 11px; color: #64748b; font-style: italic; margin-bottom: 10px; line-height: 1.5; }
.ab { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 12px; flex-shrink: 0; }
.ab.update { background: #1e2d45; color: #93c5fd; }
.ab.create { background: #14532d; color: #86efac; }
.ab.flag { background: #451a1a; color: #fca5a5; }
.sg { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; max-width: 100%; }
.ss { background: #0d1117; border: 1px solid #1e2535; border-radius: 8px; padding: 14px; text-align: center; }
.sn2 { font-size: 26px; font-weight: 700; }
.sl2 { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.max-w { max-width: 100%; margin: 0 auto; overflow-x: hidden; }
</style>
</head>
<body>
<div class="max-w">
<div id="app"></div>
</div>
<script>
var WF_PROXY = "https://patient-violet-7e22.omarsanchezjasso.workers.dev";
var STEPS = ["Connect","Select","Analyze","Review","Done"];

var state = {
  step: 0, apiKey: "", apiKeyIn: "", wfUser: null, wfProjects: [],
  connecting: false, wfErr: "", wfConnected: false,
  folder: "", selProject: "", prompt: "", response: "",
  proposals: [], approved: {}, results: [], busy: false
};

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function pj(t) {
  var m = t.match(/\[[\s\S]*\]/);
  if (!m) return null;
  try { return JSON.parse(m[0]); } catch(e) { return null; }
}
function wfUrl(path) {
  var sep = path.indexOf("?") >= 0 ? "&" : "?";
  return WF_PROXY + path + sep + "apiKey=" + state.apiKey;
}
function copyText(text) {
  navigator.clipboard.writeText(text);
}

async function connectWF() {
  if (!state.apiKeyIn.trim()) return;
  state.apiKey = state.apiKeyIn.trim();
  state.connecting = true; state.wfErr = ""; render();
  try {
    var r = await fetch(WF_PROXY + "/attask/api/v15.0/project/search?apiKey=" + state.apiKey);
    var d = await r.json();
    if (d.error) throw new Error(d.error.message || "Invalid API key");
    state.wfProjects = d.data || [];
    state.wfConnected = true;
    try {
      var ur = await fetch(WF_PROXY + "/attask/api/v15.0/user/search?fields=name&apiKey=" + state.apiKey);
      var ud = await ur.json();
      if (ud.data && ud.data[0]) state.wfUser = ud.data[0].name;
    } catch(e) {}
  } catch(e) { state.wfErr = e.message; state.apiKey = ""; }
  state.connecting = false; render();
}

async function loadTasks() {
  if (!state.folder || !state.selProject) return;
  state.busy = true; render();
  try {
    var r = await fetch(wfUrl("/attask/api/v15.0/task/search?projectID=" + state.selProject + "&fields=name,description,status,percentComplete"));
    var d = await r.json();
    var tasks = d.data || [];
    state.prompt = 'Use your Microsoft 365 connector to search SharePoint for files in the folder: "' + state.folder + '"\nRead all files found (documents, transcripts, PDFs, notes).\n\nAnalyze them against these Workfront tasks:\n' + JSON.stringify(tasks.map(function(t){ return {id:t.ID,name:t.name,status:t.status,description:t.description,percentComplete:t.percentComplete}; }), null, 2) + '\n\nReturn ONLY a raw JSON array (no explanation, no code fences):\n[{"taskId":"<ID or null>","taskName":"<name>","action":"update|create|flag","field":"status|description|name|note|percentComplete","currentValue":"<current or empty>","proposedValue":"<new value>","reason":"<one sentence with evidence>"}]';
    state.step = 2;
  } catch(e) { state.wfErr = e.message; }
  state.busy = false; render();
}

function parseAnalysis() {
  var el = document.getElementById("analysisResp");
  if (!el) return;
  var parsed = pj(el.value);
  if (!Array.isArray(parsed)) { alert("No JSON array found — paste Claude's full response."); return; }
  state.proposals = parsed;
  state.approved = {};
  parsed.forEach(function(_,i){ state.approved[i] = true; });
  state.step = 3; render();
}

function buildApplyPrompt() {
  var toApply = state.proposals.filter(function(_,i){ return state.approved[i]; });
  if (!toApply.length) return "No changes to apply.";
  var lines = ["Apply these Workfront changes:\n"];
  toApply.forEach(function(p) {
    if (p.action === "create") {
      lines.push("POST " + WF_PROXY + "/attask/api/v15.0/task?apiKey=" + state.apiKey);
      lines.push('Body: {"projectID":"' + state.selProject + '","name":"' + p.proposedValue + '","description":"' + p.reason + '"}');
    } else {
      var field = p.field === "note" ? "description" : p.field;
      var val = p.field === "note" ? "[FLAG] " + p.proposedValue : p.proposedValue;
      lines.push("PUT " + WF_PROXY + "/attask/api/v15.0/task/" + p.taskId + "?apiKey=" + state.apiKey);
      lines.push('Body: {"' + field + '":"' + val + '"} (' + p.taskName + ')');
    }
    lines.push("");
  });
  lines.push('Return ONLY: [{"taskName":"...","ok":true,"action":"updated"}]');
  return lines.join("\n");
}

function parseApply() {
  var el = document.getElementById("applyResp");
  if (!el) return;
  var toApply = state.proposals.filter(function(_,i){ return state.approved[i]; });
  var parsed = pj(el.value);
  state.results = Array.isArray(parsed) ? parsed :
    toApply.map(function(p){ return {taskName:p.taskName,ok:true,action:p.action==="create"?"created":"updated"}; });
  state.step = 4; render();
}

function approve(i) { state.approved[i] = true; render(); }
function reject(i) { state.approved[i] = false; render(); }
function reset() { state.step=1; state.proposals=[]; state.results=[]; state.approved={}; state.response=""; state.prompt=""; render(); }

function render() {
  var s = state;
  var h = '';

  // Topbar
  h += '<div class="topbar"><div style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></div>';
  h += '<span style="font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#94a3b8">Project Intelligence</span>';
  h += '<span class="badge-blue">SharePoint → Claude → Workfront</span></div>';

  // Stepper
  h += '<div class="stepper">';
  for (var i=0;i<STEPS.length;i++) {
    var cls = s.step===i?"a":s.step>i?"d":"";
    h += '<div class="si'+(cls?" "+cls:"")+'"><div class="sn'+(cls?" "+cls:"")+'>'+(s.step>i?"✓":i+1)+'</div>'+STEPS[i]+'</div>';
    if(i<STEPS.length-1) h += '<div class="sdiv"></div>';
  }
  h += '</div>';

  // Steps
  if (s.step===0) h += step0();
  else if (s.step===1) h += step1();
  else if (s.step===2) h += step2();
  else if (s.step===3) h += step3();
  else h += step4();

  document.getElementById("app").innerHTML = h;
}

function step0() {
  var h = '<div class="slabel">Step 1 — Connect your tools</div>';
  h += '<div class="card"><div class="ctitle">📂 Microsoft SharePoint</div>';
  h += '<div class="cdesc">Claude reads SharePoint via the M365 connector. You\'ll paste Claude\'s analysis in Step 3.</div>';
  h += '<div class="badge-green"><span class="gdot"></span> Ready</div></div>';
  h += '<div class="card"><div class="ctitle">⚡ Workfront</div>';
  if (state.wfConnected) {
    h += '<div class="badge-green"><span class="gdot"></span> Connected'+(state.wfUser?" · "+esc(state.wfUser):"")+' · '+state.wfProjects.length+' projects</div>';
  } else if (state.connecting) {
    h += '<div style="font-size:12px;color:#93c5fd"><span class="spinner"></span>Connecting...</div>';
  } else {
    h += '<div class="info-box"><strong style="color:#bfdbfe">Get your API key:</strong><ol style="padding-left:16px;margin-top:6px">';
    h += '<li>Open Workfront → F12 → Console</li>';
    h += '<li>Type <code style="background:#1e2535;padding:1px 4px;border-radius:3px">allow pasting</code> → Enter</li>';
    h += '<li>Run: <code style="background:#1e2535;padding:1px 4px;border-radius:3px">fetch("/attask/api/v15.0/user?action=generateApiKey",{method:"PUT",credentials:"include"}).then(r=>r.json()).then(d=>console.log(d.data.result))</code></li>';
    h += '<li>Copy the key</li></ol></div>';
    h += '<div class="field"><label class="flabel">Workfront API Key</label>';
    h += '<input type="password" id="apiKeyIn" placeholder="ftk2if..." onkeydown="if(event.key===\'Enter\')connectWF()" oninput="state.apiKeyIn=this.value;state.wfErr=\'\'"></div>';
    if (state.wfErr) h += '<div class="err">⚠ '+esc(state.wfErr)+'</div>';
    h += '<button class="btn" onclick="connectWF()">Connect →</button>';
  }
  h += '</div>';
  h += '<div style="margin-top:18px"><button class="btnp" '+(state.wfConnected?'':'disabled')+' onclick="state.step=1;render()">Continue →</button></div>';
  return h;
}

function step1() {
  var opts = '<option value="">Select project...</option>';
  state.wfProjects.forEach(function(p){ opts += '<option value="'+p.ID+'">'+esc(p.name)+'</option>'; });
  var h = '<div class="slabel">Step 2 — Select project and folder</div>';
  h += '<div class="card"><div class="row2">';
  h += '<div class="field"><label class="flabel">SharePoint Folder Name</label>';
  h += '<input type="text" id="folderIn" placeholder="e.g. 01_internal" value="'+esc(state.folder)+'" oninput="state.folder=this.value">';
  h += '<div class="hint">Claude will search this folder and read all files.</div></div>';
  h += '<div class="field"><label class="flabel">Workfront Project</label>';
  h += '<select id="projIn" onchange="state.selProject=this.value">'+opts+'</select>';
  h += '<div class="hint">'+state.wfProjects.length+' projects loaded</div></div>';
  h += '</div><div style="margin-top:12px">';
  h += '<button class="btnp" '+(state.busy?'disabled':'')+' onclick="loadTasks()">'+(state.busy?'<span class="spinner"></span>Loading...':'Generate Analysis Prompt →')+'</button>';
  h += '</div></div>';
  return h;
}

function step2() {
  var h = '<div class="slabel">Step 3 — Analyze with Claude</div>';
  h += '<div class="card"><div class="ctitle">How this works</div>';
  h += '<div class="cdesc">Copy the prompt, paste it into Claude chat, wait for the JSON response, paste it back here.</div>';
  h += '<div class="hlabel">1. Copy this prompt → paste into Claude chat</div>';
  h += '<div class="prompt-box">'+esc(state.prompt)+'</div>';
  h += '<button class="btn" onclick="copyText('+JSON.stringify(state.prompt)+')">Copy Prompt</button>';
  h += '<div class="hlabel">2. Paste Claude\'s JSON response here</div>';
  h += '<textarea id="analysisResp" placeholder="Paste Claude\'s JSON array response here..."></textarea>';
  h += '<div style="margin-top:10px"><button class="btnp" onclick="parseAnalysis()">Parse & Review →</button></div></div>';
  return h;
}

function step3() {
  var cnt = Object.values(state.approved).filter(Boolean).length;
  var ap = buildApplyPrompt();
  var h = '<div class="slabel">Step 4 — Review proposed changes</div>';
  h += '<div class="sg"><div class="ss"><div class="sn2">'+state.proposals.length+'</div><div class="sl2">Proposals</div></div>';
  h += '<div class="ss"><div class="sn2">'+cnt+'</div><div class="sl2">Approved</div></div>';
  h += '<div class="ss"><div class="sn2">'+(state.proposals.length-cnt)+'</div><div class="sl2">Skipped</div></div></div>';
  if (!state.proposals.length) h += '<div style="text-align:center;padding:40px 20px;color:#475569">No changes proposed.</div>';
  state.proposals.forEach(function(p,i) {
    var iap = state.approved[i];
    h += '<div class="pc'+(iap?" ap":"")+'"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">';
    h += '<div style="font-size:13px;font-weight:600">'+esc(p.taskName||"New Task")+'</div>';
    h += '<span class="ab '+(p.action||"update")+'">'+esc(p.action)+'</span></div>';
    h += '<div class="dr" style="flex-direction:column"><div class="db"><div class="dl">Current · '+esc(p.field||"")+'</div><div class="dv">'+esc(p.currentValue||"—")+'</div></div>';
    h += '<div style="color:#334155;font-size:12px;text-align:center;padding:4px 0">↓ proposed</div>';
    h += '<div class="db"><div class="dl">Proposed</div><div class="dv nw">'+esc(p.proposedValue)+'</div></div></div>';
    h += '<div class="rsn">"'+esc(p.reason||"")+'"</div>';
    h += '<div style="display:flex;gap:8px">';
    h += '<button class="btn" style="color:'+(iap?'#86efac':'#94a3b8')+';border-color:'+(iap?'#166534':'#1e2535')+';background:'+(iap?'#14532d':'transparent')+'" onclick="approve('+i+')">✅ Apply</button>';
    h += '<button class="btn" style="color:'+(!iap?'#fca5a5':'#94a3b8')+';border-color:'+(!iap?'#991b1b':'#1e2535')+';background:'+(!iap?'#7f1d1d':'transparent')+'" onclick="reject('+i+')">❌ Skip</button>';
    h += '</div></div>';
  });
  if (state.proposals.length > 0) {
    h += '<div class="card" style="margin-top:16px"><div class="ctitle">Apply changes via Claude</div>';
    h += '<div class="cdesc">Copy this prompt, paste into Claude chat, then paste confirmation back here.</div>';
    h += '<div class="hlabel">1. Copy apply prompt →</div>';
    h += '<div class="prompt-box">'+esc(ap)+'</div>';
    h += '<button class="btn" onclick="copyText('+JSON.stringify(ap)+')">Copy Apply Prompt</button>';
    h += '<div class="hlabel">2. Paste Claude\'s confirmation →</div>';
    h += '<textarea id="applyResp" placeholder="Paste response here..."></textarea>';
    h += '<div style="margin-top:10px;display:flex;gap:10px"><button class="btnp" onclick="parseApply()">Confirm & Done →</button>';
    h += '<button class="btn" onclick="state.step=1;state.proposals=[];state.response=\'\';render()">← Start over</button></div></div>';
  }
  return h;
}

function step4() {
  var ok = state.results.filter(function(r){return r.ok;}).length;
  var fail = state.results.filter(function(r){return !r.ok;}).length;
  var skip = state.proposals.length - Object.values(state.approved).filter(Boolean).length;
  var h = '<div class="slabel">Done</div>';
  h += '<div class="sg"><div class="ss"><div class="sn2">'+ok+'</div><div class="sl2">Applied</div></div>';
  h += '<div class="ss"><div class="sn2">'+fail+'</div><div class="sl2">Failed</div></div>';
  h += '<div class="ss"><div class="sn2">'+skip+'</div><div class="sl2">Skipped</div></div></div>';
  state.results.forEach(function(r,i){
    h += '<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px">';
    h += '<span style="font-size:16px">'+(r.ok?'✅':'❌')+'</span>';
    h += '<div><div style="font-size:13px;font-weight:600">'+esc(r.taskName||r.name||'')+'</div>';
    h += '<div style="font-size:11px;color:#64748b">'+(r.ok?r.action:'Error: '+esc(r.error||''))+'</div></div></div>';
  });
  h += '<div style="margin-top:18px"><button class="btnp" onclick="reset()">Run another analysis →</button></div>';
  return h;
}

render();
</script>
</body>
</html>
