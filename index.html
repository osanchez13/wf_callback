<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>WF Callback</title></head>
<body>
<p id="status" style="font-family:sans-serif;padding:40px;font-size:18px">Connecting to Workfront...</p>
<span id="code-display" style="display:none"></span>
<script>
  var code = new URLSearchParams(window.location.search).get("code");
  if (code) {
    if (window.opener) {
      window.opener.postMessage({ type: "WF_CODE", code: code }, "*");
      setTimeout(function(){ window.close(); }, 1000);
    }
    document.getElementById("code-display").innerText = code;
    document.getElementById("status").innerText = "Connected! You can close this tab.";
  } else {
    document.getElementById("status").innerText = "No code received — please try again.";
  }
</script>
</body>
</html>
